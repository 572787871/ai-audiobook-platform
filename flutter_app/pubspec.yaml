  cupertino_icons: ^1.0.8
  dio: ^5.7.0
  intl: ^0.20.1
  path_provider: ^2.1.5
  permission_handler: ^11.3.1
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
