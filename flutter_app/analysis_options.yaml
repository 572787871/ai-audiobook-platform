include: package:flutter_lints/flutter.yaml

analyzer:
  exclude:
    - "build/**"
    - "**/*.g.dart"
    - "**/*.freezed.dart"
  errors:
    dangling_library_doc_comments: ignore
    unnecessary_library_name: ignore
    use_build_context_synchronously: ignore
    unnecessary_brace_in_string_interps: ignore
    curly_braces_in_flow_control_structures: ignore
    prefer_interpolation_to_compose_strings: ignore
    prefer_conditional_assignment: ignore

linter:
  rules:
    prefer_const_constructors: false
    prefer_const_literals_to_create_immutables: false
    avoid_print: false
    avoid_unnecessary_containers: true
    sized_box_for_whitespace: true
    use_key_in_widget_constructors: true
    use_build_context_synchronously: false
    dangling_library_doc_comments: false
    unnecessary_brace_in_string_interps: false
    curly_braces_in_flow_control_structures: false
    prefer_interpolation_to_compose_strings: false
    prefer_conditional_assignment: false
