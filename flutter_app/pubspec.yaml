name: ai_audiobook
description: AI 有声书平台

publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ^3.5.0
  flutter: ^3.24.0

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.2
  provider: ^6.1.2
  shared_preferences: ^2.3.2
  file_picker: ^8.1.4
  audio_service: ^0.18.17
  just_audio: ^0.9.43
