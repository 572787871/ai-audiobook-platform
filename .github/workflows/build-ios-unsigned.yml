name: iOS Build Verification (Unsigned, no cert)

# 说明（环境限制，非代码问题）：
# GitHub 公开 macOS runner 没有 Apple Developer 证书。Xcode 16 在构建
# iphoneos（设备）目标时会强制校验代码签名，无证书即报
# "No development certificates available to code sign app for device deployment"。
# Flutter 官方文档也只提供“有证书”的发布路径（flutter build ipa + 证书/TestFlight）。
# 因此本 CI 不尝试产出未签名 IPA（Apple 不允许），仅做“iOS 工程可正确配置/可编译”的验证：
#   flutter build ios --config-only
# 该命令生成 Xcode 工程、拉取 SPM 依赖、校验 iOS 工程配置无误，且不触发签名。
# 真实 IPA 打包需自带证书的自托管 runner 或本地有证书的机器。
# 代码质量由 flutter analyze + flutter test（含 TXT 真实字节级往返）保证。

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ios-build-verify
  cancel-in-progress: true

jobs:
  ios-verify:
    name: Verify iOS project (config-only, no signing)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.6'
          channel: 'stable'
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Pub get
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Verify iOS project (config-only, no code signing)
        run: |
          set -e
          # --config-only 仅生成/校验 Xcode 工程与依赖，不触发签名，可在无证书 CI 成功。
          flutter build ios --config-only
          echo "iOS project configured successfully (no code signing attempted)."
