name: Build iOS IPA (Unsigned)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: build-ios-unsigned
  cancel-in-progress: true

jobs:
  build-ios:
    name: Build unsigned IPA on macOS
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.6'
          channel: 'stable'
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Pub get
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Create unsigned build xcconfig
        run: |
          set -e
          printf 'CODE_SIGNING_ALLOWED = NO\nCODE_SIGNING_REQUIRED = NO\nCODE_SIGN_IDENTITY =\nDEVELOPMENT_TEAM =\nCODE_SIGN_STYLE = Manual\n' > /tmp/unsigned.xcconfig
          cat /tmp/unsigned.xcconfig

      - name: Build unsigned archive (no code signing)
        run: |
          set -e
          flutter build ios --config-only
          # config-only 完成后，再在 runner 本地禁用 pbxproj 签名
          # （必须在 config-only 之后，否则 Flutter 会重新写回签名设置）
          python3 - <<'PY'
          import re
          p = 'ios/Runner.xcodeproj/project.pbxproj'
          s = open(p).read()
          # 移除所有带 [sdk=iphoneos*] 条件签名身份行（优先级最高，会盖过 xcconfig）
          s = re.sub(r'\s*"CODE_SIGN_IDENTITY\[sdk=iphoneos\*\]\" = "iPhone Developer";\n', '', s)
          # Automatic -> Manual（配合无 team/identity 即禁用签名）
          s = s.replace('CODE_SIGN_STYLE = Automatic;', 'CODE_SIGN_STYLE = Manual;')
          open(p, 'w').write(s)
          removed = s.count('CODE_SIGN_IDENTITY[sdk=iphoneos*]')
          print('pbxproj patched (local only); remaining conditional identity lines:', removed)
          PY
          xcodebuild archive \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -archivePath build/ios/Runner.xcarchive \
            -xcconfig /tmp/unsigned.xcconfig \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            CODE_SIGN_STYLE=Manual

      - name: Package unsigned IPA
        run: |
          set -e
          APP="build/ios/Runner.xcarchive/Products/Applications/Runner.app"
          if [ ! -d "$APP" ]; then
            echo "Runner.app not found at $APP"
            find build/ios -name "*.app" -type d
            exit 1
          fi
          WORKDIR=$(mktemp -d)
          mkdir -p "$WORKDIR/Payload"
          cp -R "$APP" "$WORKDIR/Payload/"
          IPA_NAME="ai_audiobook_platform_unsigned.ipa"
          pushd "$WORKDIR" >/dev/null
          zip -r -q "$GITHUB_WORKSPACE/$IPA_NAME" Payload
          popd >/dev/null
          ls -lh "$GITHUB_WORKSPACE/$IPA_NAME"

      - name: Upload unsigned IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-audiobook-unsigned-ipa
          path: ai_audiobook_platform_unsigned.ipa
          if-no-files-found: error
