name: iOS Build

on:
  push:
    branches: [main]
    paths:
      - "flutter_app/**"
      - ".github/workflows/ios-build.yml"
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Generate iOS project files in temp dir
        run: |
          mkdir -p /tmp/flutter_ios_gen
          cd /tmp/flutter_ios_gen
          flutter create --project-name ai_audiobook --org com.ai.audiobook --platforms=ios .
          cp -R ios "$GITHUB_WORKSPACE/flutter_app/"

      - name: Install dependencies
        working-directory: flutter_app
        run: flutter pub get

      - name: Patch Info.plist for background audio
        working-directory: flutter_app
        run: |
          INFO=ios/Runner/Info.plist
          if [ -f "$INFO" ]; then
            /usr/libexec/PlistBuddy -c "Add :UIBackgroundModes array" "$INFO" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Add :UIBackgroundModes:0 string audio" "$INFO" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Add :NSMicrophoneUsageDescription string 需要麦克风权限用于有声书录音" "$INFO" 2>/dev/null || true
            echo "Patched Info.plist"
          fi

      - name: Analyze
        working-directory: flutter_app
        run: flutter analyze --no-fatal-infos

      - name: Build IPA (unsigned)
        working-directory: flutter_app
        run: flutter build ipa --no-codesign --release --no-tree-shake-icons

      - name: Locate IPA
        working-directory: flutter_app
        run: |
          IPA_PATH=$(find build/ios/ipa -name "*.ipa" -print -quit || true)
          echo "Found IPA: $IPA_PATH"
          echo "IPA_PATH=$IPA_PATH" >> $GITHUB_ENV

      - uses: actions/upload-artifact@v4
        with:
          name: ai-audiobook-unsigned-ipa
          path: flutter_app/build/ios/ipa/*.ipa
          retention-days: 30
          if-no-files-found: error
