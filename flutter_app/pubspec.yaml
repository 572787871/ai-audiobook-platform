name: ai_audiobook
description: AI 有声书平台

publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ^3.5.0
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  shared_preferences: ^2.3.2
  file_picker: ^8.1.4
  audio_service: ^0.18.17
  just_audio: ^0.9.43
  shimmer: ^3.0.0
  google_fonts: 7.0.0
  flutter_animate: ^4.5.0
  flutter_staggered_grid_view: ^0.7.0
  pull_down_button: ^0.10.1
  auto_size_text: ^3.0.0
  cached_network_image: ^3.4.1
  cupertino_icons: ^1.0.8
  dio: ^5.7.0
  crypto: ^3.0.6
  intl: ^0.20.1
  path_provider: ^2.1.5
  path: ^1.9.0
  archive: ^3.6.1
  sherpa_onnx: ^1.9.0
  charset: ^2.0.0
  permission_handler: ^11.3.1
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  integration_test:
    sdk: flutter
  test: ^1.25.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/kokoro/model.onnx
    - assets/kokoro/voices.bin
    - assets/kokoro/tokens.txt
