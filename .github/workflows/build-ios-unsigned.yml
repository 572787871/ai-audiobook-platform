name: Build iOS IPA (Unsigned)

on:
  push:
    branches: [main, 'agent/**']
  workflow_dispatch:

concurrency:
  group: build-ios-unsigned
  cancel-in-progress: true

jobs:
  build-ios:
    name: Build unsigned IPA on macOS
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Run native tests
        run: |
          DEVICE_ID=$(xcrun simctl list devices available -j | \
            jq -r '.devices[][] | select(.name | startswith("iPhone")) | .udid' | head -1)
          test -n "$DEVICE_ID"
          xcodebuild test \
            -project Audiobook.xcodeproj \
            -scheme Audiobook \
            -destination "platform=iOS Simulator,id=$DEVICE_ID" \
            CODE_SIGNING_ALLOWED=NO

      - name: Build native unsigned app bundle
        run: |
          xcodebuild build \
            -project Audiobook.xcodeproj \
            -scheme Audiobook \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath build/ios \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

      - name: Package unsigned IPA
        run: |
          set -e
          APP="build/ios/Build/Products/Release-iphoneos/Audiobook.app"
          if [ ! -d "$APP" ]; then
            echo "Native app not found at $APP"
            find build/ios -name "*.app" -type d
            exit 1
          fi
          WORKDIR=$(mktemp -d)
          mkdir -p "$WORKDIR/Payload"
          cp -R "$APP" "$WORKDIR/Payload/"
          IPA_NAME="ai_audiobook_platform_unsigned.ipa"
          pushd "$WORKDIR" >/dev/null
          zip -r -q "$GITHUB_WORKSPACE/$IPA_NAME" Payload
          popd >/dev/null
          ls -lh "$GITHUB_WORKSPACE/$IPA_NAME"

      - name: Upload unsigned IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-audiobook-unsigned-ipa
          path: ai_audiobook_platform_unsigned.ipa
          if-no-files-found: error
