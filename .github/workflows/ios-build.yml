name: iOS Build

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "flutter_app/**"
      - ".github/workflows/ios-build.yml"
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.29.0"
          channel: stable
          cache: true

      - name: Generate iOS project files if missing
        run: |
          if [ ! -f flutter_app/ios/Runner.xcodeproj/project.pbxproj ]; then
            mkdir -p /tmp/flutter_ios_gen
            cd /tmp/flutter_ios_gen
            flutter create --project-name ai_audiobook --org com.ai.audiobook --platforms=ios .
            cp -R ios "$GITHUB_WORKSPACE/flutter_app/"
          fi

      - name: Install dependencies
        working-directory: flutter_app
        run: flutter pub get

      - name: Patch Info.plist for ATS and background audio
        working-directory: flutter_app
        run: |
          INFO=ios/Runner/Info.plist
          if [ -f "$INFO" ]; then
            /usr/libexec/PlistBuddy -c "Add :UIBackgroundModes array" "$INFO" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Add :UIBackgroundModes:0 string audio" "$INFO" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Add :NSAppTransportSecurity dict" "$INFO" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Add :NSAppTransportSecurity:NSAllowsArbitraryLoads bool true" "$INFO" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Add :NSMicrophoneUsageDescription string 需要麦克风权限用于有声书录音" "$INFO" 2>/dev/null || true
            echo "Patched Info.plist with ATS exception"
          fi

      - name: Patch project for unsigned build (set dummy DEVELOPMENT_TEAM)
        working-directory: flutter_app
        run: |
          PBX=ios/Runner.xcodeproj/project.pbxproj
          if [ -f "$PBX" ]; then
            # 设置虚拟 team 以通过 Flutter 的 team 检查；实际签名由 CODE_SIGNING_ALLOWED=NO 跳过
            sed -i '' "s/DEVELOPMENT_TEAM = "";/DEVELOPMENT_TEAM = AAAAAAAAAA;/g" "$PBX" 2>/dev/null || \
              sed -i "s/DEVELOPMENT_TEAM = "";/DEVELOPMENT_TEAM = AAAAAAAAAA;/g" "$PBX"
            echo "Patched pbxproj DEVELOPMENT_TEAM"
          fi

      - name: Analyze
        working-directory: flutter_app
        run: flutter analyze

      - name: Build for iOS Simulator (unsigned, CI 无 Apple 账号)
        working-directory: flutter_app
        run: flutter build ios --simulator --no-codesign

      - name: Verify simulator app built
        working-directory: flutter_app
        run: |
          APP=$(find build/ios -name "Runner.app" -maxdepth 3 | head -n1)
          if [ -z "$APP" ]; then
            echo "::error::Runner.app not found after build"
            exit 1
          fi
          echo "Simulator app built: $APP ($(du -sh "$APP" | cut -f1))"
