name: Build iOS IPA (Unsigned)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: build-ios-unsigned
  cancel-in-progress: true

jobs:
  build-ios:
    name: Build unsigned IPA on macOS
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.6'
          channel: 'stable'
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Pub get
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Create unsigned build xcconfig
        run: |
          set -e
          printf 'CODE_SIGNING_ALLOWED = NO\nCODE_SIGNING_REQUIRED = NO\nCODE_SIGN_IDENTITY =\nDEVELOPMENT_TEAM =\n' > /tmp/unsigned.xcconfig
          echo "Created /tmp/unsigned.xcconfig:"
          cat /tmp/unsigned.xcconfig

      - name: Build unsigned app bundle
        run: |
          set -e
          flutter build ios --config-only
          xcodebuild -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -xcconfig /tmp/unsigned.xcconfig \
            -derivedDataPath build/ios \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            build

      - name: Package unsigned IPA
        run: |
          set -e
          APP="build/ios/iphoneos/Runner.app"
          if [ ! -d "$APP" ]; then
            echo "Runner.app not found at $APP"
            find build/ios -name "*.app" -type d
            exit 1
          fi
          WORKDIR=$(mktemp -d)
          mkdir -p "$WORKDIR/Payload"
          cp -R "$APP" "$WORKDIR/Payload/"
          IPA_NAME="ai_audiobook_platform_unsigned.ipa"
          pushd "$WORKDIR" >/dev/null
          zip -r -q "$GITHUB_WORKSPACE/$IPA_NAME" Payload
          popd >/dev/null
          ls -lh "$GITHUB_WORKSPACE/$IPA_NAME"

      - name: Upload unsigned IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-audiobook-unsigned-ipa
          path: ai_audiobook_platform_unsigned.ipa
          if-no-files-found: error
