name: Build iOS IPA (Unsigned)

on:
  push:
    branches: [main, 'agent/**']
  workflow_dispatch:

concurrency:
  group: build-ios-unsigned
  cancel-in-progress: true

jobs:
  build-ios:
    name: Build unsigned IPA on macOS
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: List Xcode version
        run: xcodebuild -version

      - name: Build unsigned app
        run: |
          cd ios
          xcodebuild -project Runner.xcodeproj \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Package unsigned IPA
        run: |
          set -e
          APP="ios/build/Build/Products/Release-iphoneos/Runner.app"
          if [ ! -d "$APP" ]; then
            echo "Runner.app not found at $APP"
            find ios/build -name "*.app" -type d
            exit 1
          fi
          WORKDIR=$(mktemp -d)
          mkdir -p "$WORKDIR/Payload"
          cp -R "$APP" "$WORKDIR/Payload/"
          IPA_NAME="bookshelf-reader-unsigned.ipa"
          pushd "$WORKDIR" >/dev/null
          zip -r -q "$GITHUB_WORKSPACE/$IPA_NAME" Payload
          popd >/dev/null
          ls -lh "$GITHUB_WORKSPACE/$IPA_NAME"

      - name: Upload unsigned IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: bookshelf-reader-ios-unsigned
          path: bookshelf-reader-unsigned.ipa
          if-no-files-found: error
