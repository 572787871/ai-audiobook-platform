name: iOS Build

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: ios-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-ios:
    runs-on: macos-15
    timeout-minutes: 60
    defaults:
      run:
        working-directory: flutter_app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16.4
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.4'

      - name: Show environment
        run: |
          set -euxo pipefail
          sw_vers
          xcodebuild -version
          flutter --version || true
          ls -la /Applications | grep Xcode || true

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Install dependencies
        run: |
          set -euxo pipefail
          flutter clean
          flutter pub get

      - name: Install CocoaPods (仅当存在 Podfile 时)
        if: hashFiles('flutter_app/ios/Podfile') != ''
        run: |
          set -euxo pipefail
          cd ios
          pod install --repo-update
          cd ..

      - name: Build unsigned iOS app
        shell: bash
        run: |
          set -euxo pipefail

          flutter build ios \
            --release \
            --no-codesign \
            --verbose 2>&1 | tee flutter-ios-build.log

          echo "===== Searching for generated Runner.app ====="

          APP_PATH="$(find build/ios \
            -type d \
            -name 'Runner.app' \
            -not -path '*/Payload/*' \
            -print \
            -quit 2>/dev/null || true)"

          if [ -z "$APP_PATH" ] || [ ! -d "$APP_PATH" ]; then
            echo "::error::Flutter command completed, but no real Runner.app directory was found."

            echo "===== build/ios tree ====="
            find build/ios -maxdepth 8 -print 2>/dev/null | sort || true

            echo "===== Last 300 lines of Flutter build log ====="
            tail -n 300 flutter-ios-build.log || true

            echo "===== First relevant build errors ====="
            grep -nEi \
              '(^|[[:space:]])error:|fatal error|Provisioning|Signing|CompileSwift|SwiftCompile|PhaseScriptExecution|Undefined symbols|ld:|Command .* failed' \
              flutter-ios-build.log | head -n 200 || true

            exit 1
          fi

          APP_PATH="$(cd "$(dirname "$APP_PATH")" && pwd)/$(basename "$APP_PATH")"

          echo "APP_PATH=$APP_PATH" >> "$GITHUB_ENV"

          echo "Runner.app really exists at:"
          echo "$APP_PATH"

          test -d "$APP_PATH"
          du -sh "$APP_PATH"
          find "$APP_PATH" -maxdepth 2 -print | head -n 100

      - name: Package unsigned IPA
        shell: bash
        run: |
          set -euxo pipefail

          APP_PATH="${APP_PATH:?APP_PATH was not exported by the build step}"
          IPA_DIR="$PWD/build/ios/ipa"
          IPA_PATH="$IPA_DIR/AI-Audiobook-unsigned.ipa"

          test -d "$APP_PATH"
          test -f "$APP_PATH/Info.plist"

          rm -rf "$IPA_DIR"
          mkdir -p "$IPA_DIR/Payload"

          ditto "$APP_PATH" "$IPA_DIR/Payload/Runner.app"

          cd "$IPA_DIR"
          /usr/bin/zip -qry "AI-Audiobook-unsigned.ipa" Payload

          test -s "$IPA_PATH"

          echo "IPA generated:"
          ls -lh "$IPA_PATH"

          echo "IPA structure:"
          unzip -l "$IPA_PATH" | head -n 100

          unzip -l "$IPA_PATH" | grep -q 'Payload/Runner.app/Info.plist'

      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: AI-Audiobook-unsigned-IPA
          path: flutter_app/build/ios/ipa/AI-Audiobook-unsigned.ipa
          if-no-files-found: error
          retention-days: 30

      - name: Upload build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: iOS-build-diagnostics-${{ github.run_id }}
          path: |
            flutter_app/flutter-ios-build.log
            flutter_app/ios/Podfile.lock
            flutter_app/ios/Runner.xcodeproj/project.pbxproj
          if-no-files-found: warn
          retention-days: 7
