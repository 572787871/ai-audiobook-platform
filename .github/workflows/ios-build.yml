name: iOS Build

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: ios-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-ios:
    runs-on: macos-15
    timeout-minutes: 60
    defaults:
      run:
        working-directory: flutter_app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16.4
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.4'

      - name: Show environment
        run: |
          set -euxo pipefail
          sw_vers
          xcodebuild -version
          flutter --version || true
          ls -la /Applications | grep Xcode || true

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Install dependencies
        run: |
          set -euxo pipefail
          flutter clean
          flutter pub get

      - name: Install CocoaPods (仅当存在 Podfile 时)
        if: hashFiles('flutter_app/ios/Podfile') != ''
        run: |
          set -euxo pipefail
          cd ios
          pod install --repo-update
          cd ..

      - name: Build unsigned iOS app
        shell: bash
        run: |
          set -o pipefail

          flutter build ios \
            --release \
            --no-codesign \
            --verbose 2>&1 | tee flutter-ios-build.log

          APP_PATH="build/ios/iphoneos/Runner.app"

          echo "Checking expected app path:"
          echo "$APP_PATH"

          if [ ! -d "$APP_PATH" ]; then
            echo "::error::Runner.app was not generated."

            echo "===== Available build files ====="
            find build -maxdepth 8 -print 2>/dev/null | sort || true

            echo "===== Xcode signing settings ====="
            xcodebuild \
              -workspace ios/Runner.xcworkspace \
              -scheme Runner \
              -configuration Release \
              -showBuildSettings \
              CODE_SIGNING_ALLOWED=NO \
              CODE_SIGNING_REQUIRED=NO \
              DEVELOPMENT_TEAM="" || true

            exit 1
          fi

          echo "Runner.app found:"
          du -sh "$APP_PATH"
          ls -la "$APP_PATH"

      - name: Package unsigned IPA
        shell: bash
        run: |
          set -euxo pipefail

          APP_PATH="build/ios/iphoneos/Runner.app"
          IPA_DIR="$PWD/build/ios/ipa"
          IPA_PATH="$IPA_DIR/AI-Audiobook-unsigned.ipa"

          rm -rf "$IPA_DIR"
          mkdir -p "$IPA_DIR/Payload"

          cp -R "$APP_PATH" "$IPA_DIR/Payload/Runner.app"

          cd "$IPA_DIR"
          /usr/bin/zip -qry "AI-Audiobook-unsigned.ipa" Payload

          test -f "$IPA_PATH"
          ls -lh "$IPA_PATH"
          unzip -l "$IPA_PATH" | head -50

      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: AI-Audiobook-unsigned-IPA
          path: build/ios/ipa/AI-Audiobook-unsigned.ipa
          if-no-files-found: error
          retention-days: 30

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: iOS-build-diagnostics
          path: |
            flutter-ios-build.log
            ios/Podfile.lock
            ios/Runner.xcodeproj/project.pbxproj
          if-no-files-found: warn
          retention-days: 7
