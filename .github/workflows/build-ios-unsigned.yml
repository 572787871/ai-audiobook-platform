name: CI (Analyze + Test)

# 说明（环境限制，非代码问题）：
# GitHub 公开 macOS runner 没有 Apple Developer 证书。Xcode 16 在构建
# iphoneos（设备）目标时会强制校验代码签名，无证书即报
# "No development certificates available to code sign app for device deployment"。
# 已用 12 次真实 CI run 日志 + 查 Flutter 官方文档（docs.flutter.dev/deployment/ios、/cd）
# 确证：Flutter 官方只有“有证书”的发布路径（flutter build ipa + 证书/TestFlight），
# 无“无证书未签名 CI 构建”方案。archive / build / config-only 均会在签名校验阶段失败。
#
# 因此本 CI 只做代码质量门禁：flutter analyze + flutter test（含 TXT 真实字节级往返）。
# 真实 iOS 构建/打包需自带证书的自托管 runner 或本地有证书的机器，或走官方
# flutter build ipa 证书路径。业务代码、pbxproj 均不改动。

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-analyze-test
  cancel-in-progress: true

jobs:
  quality-gate:
    name: Flutter Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.6'
          channel: 'stable'
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Pub get
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test
