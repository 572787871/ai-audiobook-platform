name: Build iOS IPA (Unsigned)

on:
  push:
    branches: [main, 'agent/**']
  workflow_dispatch:

concurrency:
  group: build-ios-unsigned
  cancel-in-progress: true

jobs:
  build-ios:
    name: Build unsigned IPA on macOS
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.6'
          channel: 'stable'
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Pub get
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Build unsigned app bundle (no codesign)
        run: |
          flutter build ios \
            --no-codesign \
            --release \
            --verbose

      - name: Package unsigned IPA
        run: |
          set -e
          APP="build/ios/iphoneos/Runner.app"
          if [ ! -d "$APP" ]; then
            echo "Runner.app not found at $APP"
            find build/ios -name "*.app" -type d
            exit 1
          fi
          WORKDIR=$(mktemp -d)
          mkdir -p "$WORKDIR/Payload"
          cp -R "$APP" "$WORKDIR/Payload/"
          IPA_NAME="ai_audiobook_platform_unsigned.ipa"
          pushd "$WORKDIR" >/dev/null
          zip -r -q "$GITHUB_WORKSPACE/$IPA_NAME" Payload
          popd >/dev/null
          ls -lh "$GITHUB_WORKSPACE/$IPA_NAME"

      - name: Upload unsigned IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-audiobook-unsigned-ipa
          path: ai_audiobook_platform_unsigned.ipa
          if-no-files-found: error
