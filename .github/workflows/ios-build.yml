name: iOS Build

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "flutter_app/**"
      - ".github/workflows/ios-build.yml"
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # GitHub macos-latest 默认 Xcode 26 对 device build 强制 Provisioning Profile，
      # 导致未签名构建失败。切到 Xcode 15.4（不强制 device provisioning）。
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.4'

      - name: Install dependencies
        working-directory: flutter_app
        run: flutter pub get

      - name: Patch Info.plist for ATS and background audio
        working-directory: flutter_app
        run: |
          INFO=ios/Runner/Info.plist
          if [ -f "$INFO" ]; then
            /usr/libexec/PlistBuddy -c "Add :UIBackgroundModes array" "$INFO" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Add :UIBackgroundModes:0 string audio" "$INFO" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Add :NSAppTransportSecurity dict" "$INFO" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Add :NSAppTransportSecurity:NSAllowsArbitraryLoads bool true" "$INFO" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Add :NSMicrophoneUsageDescription string 需要麦克风权限用于有声书录音" "$INFO" 2>/dev/null || true
            echo "Patched Info.plist with ATS exception"
          fi

      - name: Ensure dummy DEVELOPMENT_TEAM in pbxproj (unsigned build)
        working-directory: flutter_app
        run: |
          PBX=ios/Runner.xcodeproj/project.pbxproj
          if [ -f "$PBX" ] && ! grep -q "DEVELOPMENT_TEAM" "$PBX"; then
            # 本地 pbxproj 未含 team 时，注入虚拟 team + 禁用签名
            awk '
              /CODE_SIGN_STYLE = Automatic;/ {
                print
                print "\t\t\t\tDEVELOPMENT_TEAM = AAAAAAAAAA;"
                print "\t\t\t\tCODE_SIGNING_ALLOWED = NO;"
                next
              }
              { print }
            ' "$PBX" > "$PBX.tmp" && mv "$PBX.tmp" "$PBX"
          fi
          echo "pbxproj team check done"

      - name: Build unsigned release IPA (no Apple 账号, 供企业证书自签)
        working-directory: flutter_app
        env:
          CODE_SIGNING_ALLOWED: "NO"
        run: |
          # Xcode 15.4 不强制 device provisioning，flutter build ipa --no-codesign 可完整
          # 生成未签名 Runner.ipa，后续用企业证书自签。
          flutter build ipa --release --no-codesign --build-name=1.0.0
          IPA=build/ios/ipa/Runner.ipa
          if [ ! -f "$IPA" ]; then
            echo "::error::Runner.ipa not found after build"
            ls -la build/ios/ipa/ 2>&1 || true
            exit 1
          fi
          echo "Unsigned IPA built: $IPA ($(du -sh "$IPA" | cut -f1))"
          cp "$IPA" "$GITHUB_WORKSPACE/flutter_app/build/ios/Runner-unsigned.ipa"
          echo "Unsigned IPA: $GITHUB_WORKSPACE/flutter_app/build/ios/Runner-unsigned.ipa"

      - name: Upload unsigned IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: Runner-unsigned-ipa
          path: flutter_app/build/ios/Runner-unsigned.ipa
